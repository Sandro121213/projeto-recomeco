<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Projeto Recomeço — Seu Painel de Evolução." />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#F7F5F2" />
  <title>Painel · Projeto Recomeço</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="../css/reset.css" />
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/typography.css" />
  <link rel="stylesheet" href="../css/layout.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/animations.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>

  <header class="up-navbar">
    <div class="container up-navbar__inner">
      <span class="up-navbar__brand">Projeto Recomeço</span>
      <nav class="up-navbar__nav" aria-label="Navegação do painel">
        <a href="dashboard.html" class="is-active">Painel</a>
        <a href="../index.html">Sair</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="up-dashboard-hero">
      <div class="up-card">
        <h1 class="up-section-title">Seu Recomeço</h1>
        <p class="up-section-subtitle">A consistência supera a intensidade. Veja abaixo o seu progresso acumulado:</p>
        
        <div class="up-progress-container" style="margin-top: 20px;">
          <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
            <span style="font-weight: 500;">Progresso Geral</span>
            <span id="dashboardProgressLabel" style="font-weight: 600; color: var(--color-accent);">0%</span>
          </div>
          <div style="width: 100%; height: 12px; background: var(--color-border); border-radius: var(--radius-full); overflow: hidden;">
            <div id="dashboardProgressBar" style="width: 0%; height: 100%; background: var(--color-accent); transition: width 0.4s ease;"></div>
          </div>
        </div>
      </div>
    </section>

    <section class="up-card" style="margin-top: 24px;">
      <h2>Seus 21 Dias</h2>
      <p style="color: var(--color-text-mid); font-size: var(--text-sm); margin-bottom: 20px;">Selecione o dia atual para ver sua missão:</p>
      
      <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 12px;" id="dashboardDaysGrid">
        </div>
    </section>
  </main>

  <script src="../js/utils.js" defer></script>
  <script src="../js/storage.js" defer></script>
  <script src="../js/progress.js" defer></script>
  <script src="dashboard.js" defer></script>
</body>
</html>
